name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  enrichment-api:
    name: FastAPI enrichment (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/enrichment-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest -q

  cloud-nodes:
    name: Deployed Cloud Code nodes (node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run node-body tests
        run: |
          node n8n/cloud/tests/test_node_bodies.mjs
          node n8n/cloud/tests/test_prepare.mjs
          node n8n/cloud/tests/test_compose.mjs
          node n8n/cloud/tests/test_bonus_nodes.mjs
          node n8n/cloud/tests/test_selfhosted_workflow.mjs

  extractor:
    name: Document extractor (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install extractor deps
        run: pip install pymupdf pdfplumber python-docx
      - name: Run extractor tests
        run: pytest tests/test_extractor.py -q

  n8n-cloud-audit:
    name: n8n Cloud audit (optional)
    runs-on: ubuntu-latest
    if: ${{ secrets.N8N_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install audit deps
        run: pip install httpx python-dotenv
      - name: Run read-only Cloud audit
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_API_URL: https://reemmor.app.n8n.cloud
        run: python scripts/audit_n8n_cloud.py

  lint:
    name: Ruff lint (enrichment-api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/enrichment-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.8.4
      - name: Run ruff
        run: ruff check .
