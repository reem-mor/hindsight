<svg viewBox="0 0 1300 1060" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">HINDSIGHT — Cyber-Incident Intelligence pipeline</title>
  <desc id="d">End-to-end n8n + Gemini 3 + FastAPI pipeline: intake, extraction with Vision, Gemini Flash extraction with a parallel Pro compare, a deterministic enrichment brain, and three output channels (Google Sheets, output_docs, Gmail), plus semantic search, live dashboard and daily digest.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5b6b7a"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3f8f6b"/>
    </marker>
    <style>
      .card{fill:#131a23;stroke:#222c38;stroke-width:1.2;}
      .ttl{fill:#e9eef3;font-weight:650;}
      .sub{fill:#8b98a5;font-size:12px;}
      .ic{font-size:21px;}
      .lay{fill:#6b7b8a;font-size:11px;letter-spacing:1.5px;font-weight:600;}
      .pill{font-size:10.5px;font-weight:700;}
      .edge{stroke:#41515f;stroke-width:2;fill:none;}
      .edgeD{stroke:#41515f;stroke-width:1.6;fill:none;stroke-dasharray:5 4;}
      .edgeG{stroke:#3f8f6b;stroke-width:2;fill:none;}
    </style>
  </defs>

  <rect x="0" y="0" width="1300" height="1060" fill="#0a0e14"/>
  <rect x="8" y="8" width="1284" height="1044" rx="16" fill="none" stroke="#1a2330" stroke-width="1"/>

  <!-- Title -->
  <text x="46" y="58" fill="#ffffff" font-size="34" font-weight="800">HINDSIGHT</text>
  <text x="270" y="58" fill="#3ecf8e" font-size="16" font-weight="700">· Cyber-Incident Intelligence</text>
  <text x="46" y="84" fill="#8b98a5" font-size="14.5">End-to-end document pipeline — n8n · Google Gemini 3 · FastAPI · Google Sheets · Gmail · Supabase pgvector</text>

  <!-- Legend -->
  <g transform="translate(978,34)">
    <rect width="288" height="118" rx="10" fill="#0f151d" stroke="#1f2a36"/>
    <text x="16" y="24" class="lay">PIPELINE LAYERS</text>
    <g transform="translate(16,40)" font-size="12" fill="#c3ccd6">
      <circle cx="6" cy="6" r="6" fill="#3b82f6"/><text x="20" y="10">Intake</text>
      <circle cx="6" cy="32" r="6" fill="#06b6d4"/><text x="20" y="36">Extraction · Vision</text>
      <circle cx="6" cy="58" r="6" fill="#a855f7"/><text x="20" y="62">Gemini 3 AI</text>
      <circle cx="158" cy="6" r="6" fill="#f59e0b"/><text x="172" y="10">Deterministic brain</text>
      <circle cx="158" cy="32" r="6" fill="#10b981"/><text x="172" y="36">Output channels</text>
      <circle cx="158" cy="58" r="6" fill="#f472b6"/><text x="172" y="62">Bonus challenge</text>
    </g>
  </g>

  <!-- ============ MAIN SPINE ============ -->
  <!-- Intake -->
  <g transform="translate(300,150)">
    <rect class="card" width="260" height="72" rx="12"/>
    <rect width="5" height="72" rx="2.5" fill="#3b82f6"/>
    <text x="20" y="30" class="lay" fill="#3b82f6">1 · INTAKE</text>
    <text class="ic" x="20" y="60">📥</text>
    <text x="52" y="52" class="ttl" font-size="15">Form upload · folder watch · ZIP</text>
    <g transform="translate(196,11)"><rect width="52" height="18" rx="9" fill="#3b82f622" stroke="#3b82f6"/><text x="26" y="13" text-anchor="middle" class="pill" fill="#7eb0ff">BON-7</text></g>
  </g>

  <!-- Extract -->
  <g transform="translate(300,266)">
    <rect class="card" width="260" height="72" rx="12"/>
    <rect width="5" height="72" rx="2.5" fill="#06b6d4"/>
    <text x="20" y="30" class="lay" fill="#06b6d4">2 · EXTRACT</text>
    <text class="ic" x="20" y="60">📄</text>
    <text x="52" y="52" class="ttl" font-size="15">PyMuPDF · DOCX · TXT</text>
  </g>

  <!-- Gemini Flash -->
  <g transform="translate(300,382)">
    <rect class="card" width="260" height="78" rx="12"/>
    <rect width="5" height="78" rx="2.5" fill="#a855f7"/>
    <text x="20" y="30" class="lay" fill="#a855f7">3 · GEMINI 3 FLASH</text>
    <text class="ic" x="20" y="62">✨</text>
    <text x="52" y="52" class="ttl" font-size="15">Strict JSON · temp 0.2</text>
    <text x="52" y="69" class="sub">HTTP POST · key via n8n credential</text>
    <g transform="translate(150,10)"><rect width="98" height="18" rx="9" fill="#a855f722" stroke="#a855f7"/><text x="49" y="13" text-anchor="middle" class="pill" fill="#cda4f7">retry 5×/3s · BON-4</text></g>
  </g>

  <!-- Parse -->
  <g transform="translate(300,484)">
    <rect class="card" width="260" height="58" rx="12"/>
    <rect width="5" height="58" rx="2.5" fill="#a855f7"/>
    <text class="ic" x="20" y="38">🧩</text>
    <text x="52" y="34" class="ttl" font-size="15">Parse + validate JSON</text>
    <text x="52" y="50" class="sub">safe-fail · schema guard</text>
  </g>

  <!-- Deterministic Brain -->
  <g transform="translate(276,574)">
    <rect class="card" width="308" height="104" rx="14" stroke="#f59e0b" stroke-width="1.6"/>
    <rect width="5" height="104" rx="2.5" fill="#f59e0b"/>
    <text x="20" y="28" class="lay" fill="#f59e0b">4 · DETERMINISTIC BRAIN</text>
    <text class="ic" x="20" y="60">🧠</text>
    <text x="54" y="54" class="ttl" font-size="16">FastAPI /enrich · enrich.js</text>
    <text x="20" y="80" class="sub" font-size="12.5">CVSS floor → SEV · sensitivity · routing_tag · UUID</text>
    <text x="20" y="96" class="sub" font-size="11" fill="#fbbf24" font-style="italic">the LLM extracts — the service decides</text>
  </g>

  <!-- ============ AI SIDE COLUMN (right) ============ -->
  <!-- Vision -->
  <g transform="translate(636,266)">
    <rect class="card" width="250" height="72" rx="12"/>
    <rect width="5" height="72" rx="2.5" fill="#06b6d4"/>
    <text x="20" y="28" class="lay" fill="#06b6d4">VISION</text>
    <text class="ic" x="20" y="58">👁️</text>
    <text x="52" y="50" class="ttl" font-size="15">Embedded charts → Gemini</text>
    <g transform="translate(186,10)"><rect width="52" height="18" rx="9" fill="#06b6d422" stroke="#06b6d4"/><text x="26" y="13" text-anchor="middle" class="pill" fill="#67e8f9">BON-1</text></g>
  </g>
  <!-- Gemini Pro -->
  <g transform="translate(636,382)">
    <rect class="card" width="250" height="48" rx="12"/>
    <rect width="5" height="48" rx="2.5" fill="#c084fc"/>
    <text class="ic" x="20" y="33" font-size="17">✨</text>
    <text x="48" y="30" class="ttl" font-size="14">Gemini 3.1 Pro · parallel</text>
  </g>
  <!-- Compare -->
  <g transform="translate(636,448)">
    <rect class="card" width="250" height="56" rx="12"/>
    <rect width="5" height="56" rx="2.5" fill="#f472b6"/>
    <text class="ic" x="20" y="36">⚖️</text>
    <text x="52" y="32" class="ttl" font-size="15">Compare Flash ↔ Pro</text>
    <text x="52" y="48" class="sub">field diff · agreement</text>
    <g transform="translate(186,9)"><rect width="52" height="18" rx="9" fill="#f472b622" stroke="#f472b6"/><text x="26" y="13" text-anchor="middle" class="pill" fill="#f9a8d4">BON-6</text></g>
  </g>
  <!-- Semantic Search -->
  <g transform="translate(636,574)">
    <rect class="card" width="308" height="104" rx="14"/>
    <rect width="5" height="104" rx="2.5" fill="#f472b6"/>
    <text x="20" y="28" class="lay" fill="#f472b6">SEMANTIC SEARCH</text>
    <text class="ic" x="20" y="60">🔍</text>
    <text x="54" y="54" class="ttl" font-size="16">Supabase pgvector</text>
    <text x="20" y="80" class="sub" font-size="12.5">gemini-embedding-001 · 768-dim · HNSW</text>
    <text x="20" y="96" class="sub" font-size="11">POST /search · /index</text>
    <g transform="translate(244,11)"><rect width="52" height="18" rx="9" fill="#f472b622" stroke="#f472b6"/><text x="26" y="13" text-anchor="middle" class="pill" fill="#f9a8d4">BON-5</text></g>
  </g>

  <!-- ============ OUTPUT CHANNELS ============ -->
  <text x="48" y="744" class="lay" fill="#10b981">5 · OUTPUT CHANNELS</text>
  <!-- Sheets -->
  <g transform="translate(48,758)">
    <rect class="card" width="244" height="76" rx="12"/>
    <rect width="5" height="76" rx="2.5" fill="#10b981"/>
    <text class="ic" x="20" y="46">📊</text>
    <text x="52" y="40" class="ttl" font-size="15">Google Sheets</text>
    <text x="52" y="58" class="sub">14-col Incidents registry</text>
  </g>
  <!-- output_docs -->
  <g transform="translate(316,758)">
    <rect class="card" width="220" height="76" rx="12"/>
    <rect width="5" height="76" rx="2.5" fill="#10b981"/>
    <text class="ic" x="20" y="46">🗂️</text>
    <text x="52" y="40" class="ttl" font-size="15">output_docs/</text>
    <text x="52" y="58" class="sub">JSON + Markdown</text>
  </g>
  <!-- Gmail -->
  <g transform="translate(560,758)">
    <rect class="card" width="268" height="76" rx="12"/>
    <rect width="5" height="76" rx="2.5" fill="#10b981"/>
    <text class="ic" x="20" y="46">📧</text>
    <text x="52" y="40" class="ttl" font-size="15">Gmail</text>
    <text x="52" y="58" class="sub">per-doc · SEV1 page · filed</text>
  </g>

  <!-- ============ BONUS OUTPUTS ============ -->
  <!-- Live Dashboard -->
  <g transform="translate(48,872)">
    <rect class="card" width="244" height="64" rx="12"/>
    <rect width="5" height="64" rx="2.5" fill="#f472b6"/>
    <text class="ic" x="20" y="40" font-size="18">📈</text>
    <text x="50" y="34" class="ttl" font-size="14.5">Live SOC Dashboard</text>
    <text x="50" y="51" class="sub">Chart.js · live Sheet CSV</text>
    <g transform="translate(180,8)"><rect width="52" height="18" rx="9" fill="#f472b622" stroke="#f472b6"/><text x="26" y="13" text-anchor="middle" class="pill" fill="#f9a8d4">BON-3</text></g>
  </g>
  <!-- SEV1 / Sensitivity alert -->
  <g transform="translate(560,872)">
    <rect class="card" width="268" height="64" rx="12"/>
    <rect width="5" height="64" rx="2.5" fill="#f472b6"/>
    <text class="ic" x="20" y="40" font-size="18">🚨</text>
    <text x="50" y="34" class="ttl" font-size="14.5">SEV1 / confidential alert</text>
    <text x="50" y="51" class="sub">immediate high-priority page</text>
    <g transform="translate(204,8)"><rect width="52" height="18" rx="9" fill="#f472b622" stroke="#f472b6"/><text x="26" y="13" text-anchor="middle" class="pill" fill="#f9a8d4">BON-8</text></g>
  </g>
  <!-- Daily Digest -->
  <g transform="translate(872,872)">
    <rect class="card" width="244" height="64" rx="12"/>
    <rect width="5" height="64" rx="2.5" fill="#f472b6"/>
    <text class="ic" x="20" y="40" font-size="18">⏰</text>
    <text x="50" y="34" class="ttl" font-size="14.5">Daily Digest</text>
    <text x="50" y="51" class="sub">scheduled 08:00 UTC · 24 h</text>
    <g transform="translate(180,8)"><rect width="52" height="18" rx="9" fill="#f472b622" stroke="#f472b6"/><text x="26" y="13" text-anchor="middle" class="pill" fill="#f9a8d4">BON-2</text></g>
  </g>

  <!-- ============ EDGES ============ -->
  <!-- spine -->
  <path class="edge" d="M430,222 L430,266" marker-end="url(#arr)"/>
  <path class="edge" d="M430,338 L430,382" marker-end="url(#arr)"/>
  <path class="edge" d="M430,460 L430,484" marker-end="url(#arr)"/>
  <path class="edge" d="M430,542 L430,574" marker-end="url(#arr)"/>
  <!-- extract -> vision (conditional) -->
  <path class="edgeD" d="M560,300 L636,300" marker-end="url(#arr)"/>
  <text x="572" y="293" fill="#6b7b8a" font-size="10.5">if images</text>
  <!-- vision -> flash -->
  <path class="edgeD" d="M700,338 L560,408" marker-end="url(#arr)"/>
  <!-- flash -> pro -->
  <path class="edge" d="M560,410 L636,406" marker-end="url(#arr)"/>
  <!-- pro -> compare -->
  <path class="edge" d="M761,430 L761,448" marker-end="url(#arr)"/>
  <!-- parse -> compare (flash result) -->
  <path class="edgeD" d="M560,508 L636,490" marker-end="url(#arr)"/>
  <!-- brain -> outputs -->
  <path class="edgeG" d="M340,678 C300,720 220,728 175,758" marker-end="url(#arrG)"/>
  <path class="edgeG" d="M430,678 L426,758" marker-end="url(#arrG)"/>
  <path class="edgeG" d="M520,678 C600,720 640,728 678,758" marker-end="url(#arrG)"/>
  <!-- brain -> semantic -->
  <path class="edgeD" d="M584,626 L636,626" marker-end="url(#arr)"/>
  <!-- sheets -> dashboard -->
  <path class="edge" d="M170,834 L170,872" marker-end="url(#arr)"/>
  <!-- gmail -> sev1 alert -->
  <path class="edge" d="M694,834 L694,872" marker-end="url(#arr)"/>
  <!-- sheets -> digest -->
  <path class="edgeD" d="M292,818 C700,860 760,860 994,872" marker-end="url(#arr)"/>
</svg>
