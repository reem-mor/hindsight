# =============================================================================
# HINDSIGHT — Service Catalog
# -----------------------------------------------------------------------------
# Single source of truth that turns a service name (extracted by Gemini from a
# postmortem) into ownership, criticality, SLO and regulatory exposure.
#
# This is intentionally DATA, not code. Editing this file changes routing and
# severity behaviour with zero deploys — the way a real platform team would
# operate a service registry. Tier drives the severity rubric; jurisdictions
# drive regulatory escalation (modelled on a multi-jurisdiction gaming estate:
# UKGC, NJ-DGE, MGM).
#
# tier:   critical | high | standard | internal
# slo:    monthly availability target (used to compute error-budget burn)
# =============================================================================

defaults:
  team: "SRE-Platform"
  tier: "standard"
  slo: 99.9
  jurisdictions: ["GLOBAL"]

# Each entry may list aliases — the messy names Gemini will actually emit
# ("payment gateway", "wallet-svc", "the casino platform") all resolve home.
services:
  - name: "payments-gateway"
    aliases: ["payments", "payment gateway", "pay-gw", "psp", "deposits", "withdrawals"]
    team: "Payments-SRE"
    tier: "critical"
    slo: 99.95
    jurisdictions: ["UKGC", "NJ-DGE", "MGM"]

  - name: "wallet"
    aliases: ["wallet-svc", "player wallet", "balance service", "ledger"]
    team: "Payments-SRE"
    tier: "critical"
    slo: 99.95
    jurisdictions: ["UKGC", "NJ-DGE", "MGM"]

  - name: "casino-platform"
    aliases: ["casino", "rgs", "game server", "slots platform", "game-platform"]
    team: "Platform-SRE"
    tier: "critical"
    slo: 99.9
    jurisdictions: ["UKGC", "NJ-DGE"]

  - name: "sportsbook"
    aliases: ["betting engine", "trading platform", "odds-service", "sports"]
    team: "Sportsbook-SRE"
    tier: "critical"
    slo: 99.9
    jurisdictions: ["UKGC", "NJ-DGE", "MGM"]

  - name: "identity"
    aliases: ["auth", "authentication", "login", "sso", "session-service", "idp"]
    team: "Identity-SRE"
    tier: "critical"
    slo: 99.95
    jurisdictions: ["GLOBAL"]

  - name: "kyc"
    aliases: ["know your customer", "onboarding", "verification", "aml-screening"]
    team: "Compliance-Eng"
    tier: "high"
    slo: 99.5
    jurisdictions: ["UKGC", "NJ-DGE", "MGM"]

  - name: "geo-compliance"
    aliases: ["geolocation", "geo-gate", "jurisdiction-check", "geo-fencing"]
    team: "Compliance-Eng"
    tier: "critical"
    slo: 99.9
    jurisdictions: ["NJ-DGE", "MGM"]

  - name: "promotions"
    aliases: ["bonus engine", "promo", "rewards", "loyalty"]
    team: "Engagement-Eng"
    tier: "high"
    slo: 99.5
    jurisdictions: ["UKGC", "NJ-DGE"]

  - name: "reporting-db"
    aliases: ["data warehouse", "analytics db", "regulatory reporting", "dwh"]
    team: "Data-Platform"
    tier: "high"
    slo: 99.0
    jurisdictions: ["UKGC", "NJ-DGE", "MGM"]

  - name: "edge-cdn"
    aliases: ["cdn", "edge", "waf", "reverse proxy", "ingress"]
    team: "Platform-SRE"
    tier: "high"
    slo: 99.9
    jurisdictions: ["GLOBAL"]

  - name: "notifications"
    aliases: ["email service", "sms gateway", "push", "comms"]
    team: "Engagement-Eng"
    tier: "standard"
    slo: 99.0
    jurisdictions: ["GLOBAL"]

  - name: "internal-tooling"
    aliases: ["jenkins", "ci", "ci/cd", "deploy pipeline", "grafana", "internal dashboard"]
    team: "DevEx"
    tier: "internal"
    slo: 99.0
    jurisdictions: ["GLOBAL"]

  # ── Cyber / SecOps estate (hybrid scenario) ───────────────────────────────
  # Security-domain services so SIEM exports and vuln scans resolve to an owner
  # the same deterministic way reliability incidents do.
  - name: "siem"
    aliases: ["splunk", "elastic siem", "security monitoring", "log pipeline", "wazuh", "sentinel"]
    team: "SecOps"
    tier: "high"
    slo: 99.5
    jurisdictions: ["GLOBAL"]

  - name: "endpoint-security"
    aliases: ["edr", "antivirus", "av", "crowdstrike", "defender", "endpoint protection", "xdr"]
    team: "SecOps"
    tier: "high"
    slo: 99.5
    jurisdictions: ["GLOBAL"]

  - name: "vulnerability-scanner"
    aliases: ["nessus", "qualys", "vuln scanner", "tenable", "scanner", "trivy", "snyk"]
    team: "SecOps"
    tier: "standard"
    slo: 99.0
    jurisdictions: ["GLOBAL"]

# Incident-type → default routing hint when no service is confidently matched.
type_routing:
  security: "Security-IR"
  data-incident: "Compliance-Eng"
  deployment-failure: "DevEx"
  capacity: "SRE-Platform"
  dependency-failure: "SRE-Platform"
  configuration: "SRE-Platform"
  outage: "SRE-Platform"
  degradation: "SRE-Platform"
  other: "SRE-Platform"
  # Cyber/SecOps hybrid types.
  vulnerability-scan: "SecOps"
  malware: "SecOps"
  phishing: "SecOps"
  intrusion: "Security-IR"
  ddos: "Platform-SRE"
