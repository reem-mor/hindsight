# HINDSIGHT — SecOps service catalog (cybersecurity incident logs scenario)
# Maps systems named in SIEM exports, vuln scans, and phishing reports to owning teams.

defaults:
  team: "SecOps"
  tier: "standard"
  slo: 99.0
  jurisdictions: ["GLOBAL"]

services:
  - name: "siem"
    aliases: ["splunk", "elastic siem", "security monitoring", "log pipeline", "wazuh", "sentinel", "siem cluster"]
    team: "SecOps"
    tier: "high"
    slo: 99.5
    jurisdictions: ["GLOBAL"]

  - name: "endpoint-security"
    aliases: ["edr", "antivirus", "av", "crowdstrike", "defender", "endpoint protection", "xdr", "hosts"]
    team: "SecOps"
    tier: "high"
    slo: 99.5
    jurisdictions: ["GLOBAL"]

  - name: "vulnerability-scanner"
    aliases: ["nessus", "qualys", "vuln scanner", "tenable", "scanner", "trivy", "snyk", "openvas"]
    team: "SecOps"
    tier: "standard"
    slo: 99.0
    jurisdictions: ["GLOBAL"]

  - name: "auth"
    aliases: ["identity", "login", "sso", "idp", "authentication", "session-service", "oauth"]
    team: "Identity-Sec"
    tier: "high"
    slo: 99.5
    jurisdictions: ["GLOBAL"]

  - name: "network"
    aliases: ["firewall", "ids", "ips", "waf", "perimeter", "edge", "cdn", "ingress"]
    team: "NetSec"
    tier: "high"
    slo: 99.5
    jurisdictions: ["GLOBAL"]

  - name: "email-gateway"
    aliases: ["mail relay", "smtp", "phishing filter", "mimecast", "email security", "proofpoint"]
    team: "SecOps"
    tier: "standard"
    slo: 99.0
    jurisdictions: ["GLOBAL"]

  - name: "internal-tooling"
    aliases: ["jenkins", "ci", "grafana", "internal dashboard", "soar", "ticketing"]
    team: "SecOps"
    tier: "internal"
    slo: 99.0
    jurisdictions: ["GLOBAL"]

type_routing:
  security: "Security-IR"
  data-incident: "Security-IR"
  vulnerability-scan: "SecOps"
  malware: "SecOps"
  phishing: "SecOps"
  intrusion: "Security-IR"
  ddos: "NetSec"
  outage: "SecOps"
  degradation: "SecOps"
  configuration: "SecOps"
  other: "SecOps"
